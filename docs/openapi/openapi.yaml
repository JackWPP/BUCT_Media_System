openapi: 3.1.0
info:
  title: 视觉北化
  description: '视觉北化 (Visual BUCT) - 北京化工大学媒体资源管理系统后端接口。



    认证方式：大多数受保护接口使用 `Authorization: Bearer <token>`。

    前端常用登录接口为 `POST /api/v1/auth/login`，OpenAPI 工具链兼容登录接口为 `POST /api/v1/auth/token`。'
  version: 1.0.0
paths:
  /api/v1/auth/login:
    post:
      tags:
      - Authentication
      summary: Login
      description: '用户登录


        支持学号或邮箱登录，返回 JWT token 和用户信息。'
      operationId: login_api_v1_auth_login_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/auth/me:
    get:
      tags:
      - Authentication
      summary: Get Current User Info
      description: 获取当前登录用户信息
      operationId: get_current_user_info_api_v1_auth_me_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
      security:
      - OAuth2PasswordBearer: []
  /api/v1/auth/token:
    post:
      tags:
      - Authentication
      summary: Login For Access Token
      description: 'OAuth2 兼容的 token 登录端点


        username 字段可以是学号或邮箱。'
      operationId: login_for_access_token_api_v1_auth_token_post
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Body_login_for_access_token_api_v1_auth_token_post'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Token'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/auth/register:
    post:
      tags:
      - Authentication
      summary: Register
      description: '用户注册


        必须提供学号，邮箱可选。'
      operationId: register_api_v1_auth_register_post
      requestBody:
        content:
          application/json:
            schema:
