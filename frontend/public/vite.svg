<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- 背景圆 -->
  <circle cx="200" cy="200" r="190" fill="#e60012"/>
  
  <!-- 镜头外环 -->
  <circle cx="200" cy="200" r="130" fill="none" stroke="white" stroke-width="8"/>
  
  <!-- 光圈叶片 - 六边形 -->
  <polygon points="200,85 250,120 250,180 200,215 150,180 150,120" fill="none" stroke="white" stroke-width="6"/>
  
  <!-- 化学六边形（苯环）- 内嵌 -->
  <polygon points="200,130 225,145 225,175 200,190 175,175 175,145" fill="white" opacity="0.3"/>
  
  <!-- 中心点 -->
  <circle cx="200" cy="200" r="25" fill="white"/>
  <circle cx="200" cy="200" r="12" fill="#e60012"/>
  
  <!-- V 字母抽象（Visual） -->
  <path d="M170 260 L200 310 L230 260" stroke="white" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>